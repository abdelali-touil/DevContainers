services:
  # cmd is the main container where we can run DevOps commands, tools, and scripts.
  cmd:
    build:
      context: .
      dockerfile: cmd/Dockerfile
    container_name: cmd
    image: cmd:latest
    stdin_open: true
    tty: true
    volumes:
      - ./secrets/.kube:/home/cmd/.kube:rw
      - ./secrets/.ssh:/home/cmd/.ssh:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace
    environment:
      - KUBECONFIG=/home/cmd/.kube/config
    working_dir: /workspace
    command: /bin/bash

  # maildev is a simple email testing tool that allows you to capture and view emails sent from the applications.
  maildev:
    image: maildev/maildev
    container_name: maildev
    ports:
      - "1080:1080"
      - "25:1025"
    volumes:
      - ./data/maildev:/data
    restart: always

  # portainer is a lightweight management UI that allows you to easily manage your Docker environments.
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    restart: always

  # sonarqube:
  #   image: sonarqube:latest
  #   container_name: sonarqube
  #   ports:
  #     - "9091:9000"
  #   volumes:
  #     - ./data/sonarqube:/opt/sonarqube/data
  #   environment:
  #     - SONARQUBE_JDBC_URL=jdbc:postgresql://postgres:5432/sonar
  #     - SONARQUBE_JDBC_USERNAME=sonar
  #     - SONARQUBE_JDBC_PASSWORD=sonar
  #   depends_on:
  #     - postgres
  
  # postgres is a powerful, open source object-relational database system that uses and extends the SQL language.
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql
    restart: always

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=test
      - DB_POSTGRESDB_USER=test
      - DB_POSTGRESDB_PASSWORD=test
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ./data/n8n_storage:/home/node/.n8n

  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    ports:
      - "9002:8443"
    environment:
      - DRAWIO_SELF_CONTAINED=1
      # - DRAWIO_EXPORT_URL=http://localhost:8000/ --- IGNORE ---
    restart: always
